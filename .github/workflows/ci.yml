name: AST Azure wrapper CI

on: [pull_request]

permissions:
  contents: read

jobs:
  integration-tests:
    runs-on: cx-public-ubuntu-x64
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          registry-url: https://npm.echohq.com/

      - name: Configure GitHub Packages auth
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm config set //npm.pkg.github.com/:_authToken "${GH_TOKEN}"
          cat cxAstScan/.npmrc > /tmp/cxAstScan-npmrc
          echo "//npm.pkg.github.com/:_authToken=${GH_TOKEN}" >> /tmp/cxAstScan-npmrc

      - name: npm install
        run: |
          npm install
          cd cxAstScan/
          npm install --userconfig /tmp/cxAstScan-npmrc

      - name: Code Linting
        run: npm run lint

      - run: npm run build

      - name: Run tests
        env:
          CX_CLIENT_ID: ${{ secrets.CX_CLIENT_ID }}
          CX_CLIENT_SECRET: ${{ secrets.CX_CLIENT_SECRET }}
          CX_BASE_URI: ${{ secrets.CX_BASE_URI }}
          CX_TENANT: ${{ secrets.CX_TENANT }}
          CX_API_KEY: ${{ secrets.CX_API_KEY }}
        run: npm run coverage

      - name: Upload coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-report
          path: ./coverage
