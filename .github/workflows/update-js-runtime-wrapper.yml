name: Update AST CLI JavaScript Runtime Wrapper Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Specify a version (e.g., 1.2.3). Leave empty for the latest official version."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  update-js-wrapper:
    runs-on: cx-public-ubuntu-x64
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Determine Version
        id: get_version
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(curl -s "https://api.github.com/repos/Checkmarx/ast-cli-javascript-wrapper-runtime-cli/releases" | jq -r '[.[] | select(.prerelease == false) | .tag_name | select(test("^v?[0-9]+\\.[0-9]+\\.[0-9]+$")) | ltrimstr("v")] | sort_by(split(".") | map(tonumber)) | .[-1]')
          fi

          # Remove leading 'v' if present
          VERSION="${VERSION#v}"
          echo "Normalized version (without leading 'v'): $VERSION"

          if [[ -z "$VERSION" || "$VERSION" == "null" ]]; then
            echo "Failed to determine a valid version."
            exit 1
          fi

          echo "VERSION=$VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Update package.json
        run: |
          sed -i "s|\"@Checkmarx/ast-cli-javascript-wrapper-runtime-cli\": \"[0-9]*\\.[0-9]*\\.[0-9]*\"|\"@Checkmarx/ast-cli-javascript-wrapper-runtime-cli\": \"${VERSION}\"|" cxAstScan/package.json

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          registry-url: https://npm.echohq.com/

      - name: Configure GitHub Packages auth
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm config set //npm.pkg.github.com/:_authToken "${GH_TOKEN}"

      - name: Build step
        run: |
          npm ci
          cd cxAstScan/
          npm ci

      - name: Commit Changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add cxAstScan/package.json cxAstScan/package-lock.json
          git commit -m "Update AST CLI JavaScript Wrapper to version ${VERSION}"

      - name: Create Pull Request
        uses: step-security/create-pull-request@50c103da2b9ca12cd5bc013fc6931051a5aa872b # v8.1.1
        with:
          token: ${{ secrets.AUTOMATION_TOKEN }}
          commit-message: Update AST CLI JavaScript Runtime Wrapper to version ${{ env.VERSION }}
          title: Update AST CLI JavaScript Runtime Wrapper to version ${{ env.VERSION }}
          body: |
            Updates the AST CLI JavaScript Runtime Wrapper to version `${{ env.VERSION }}`

            Auto-generated by [create-pull-request][2]
          labels: cxone
          branch: feature/update_js_wrapper_${{ env.VERSION }}
